<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math DAG Layout Comparison</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --text: #1f1f1f;
      --muted: #5f5a54;
      --border: #d6d0c4;
      --accent: #a6192e;
      --accent-dark: #76232f;
      --node-fill: #ffffff;
      --node-stroke: #1f1f1f;
      --link-stroke: #1f1f1f;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      font-family: "Fira Sans", "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .page {
      display: grid;
      grid-template-rows: 56px 1fr;
      height: 100%;
    }

    .title {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent-dark);
    }

    .panels {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 12px;
      padding: 12px;
      height: 100%;
      overflow: hidden;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: 0 10px 18px rgba(15, 23, 42, 0.07);
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: #fbfaf8;
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
    }

    .panel-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent-dark);
      margin: 0;
    }

    .zoom-controls {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .zoom-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 8px;
      min-width: 28px;
      height: 26px;
      padding: 0 8px;
      font: 600 0.85rem/1 "Fira Sans", "Segoe UI", sans-serif;
      cursor: pointer;
    }

    .zoom-btn:hover {
      border-color: #bdb5a8;
    }

    .zoom-label {
      min-width: 44px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .canvas {
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    .canvas-inner {
      width: 100%;
      height: 100%;
    }

    .status {
      color: var(--muted);
      font-size: 0.92rem;
      text-align: center;
      margin-top: 12px;
    }

    .error {
      color: #b91c1c;
      white-space: pre-wrap;
      font-size: 0.92rem;
      padding: 12px;
    }

    svg {
      display: block;
      max-width: none !important;
      background: #fff;
    }

    .node rect {
      fill: var(--node-fill);
      stroke: var(--node-stroke);
      stroke-width: 1.1;
      rx: 6;
      ry: 6;
    }

    .node text {
      fill: var(--text);
      font-size: 11px;
      font-weight: 600;
      dominant-baseline: middle;
      text-anchor: middle;
      pointer-events: none;
    }

    .edgePath path {
      fill: none;
      stroke: var(--link-stroke);
      stroke-width: 1.05;
    }
  </style>
</head>
<body>
  <main class="page">
    <h1 class="title">Math DAG Layout Comparison</h1>
    <section class="panels">
      <article class="panel" data-engine="mermaid">
        <header class="panel-header">
          <h2 class="panel-title">Mermaid (dagre)</h2>
          <span class="zoom-controls">
            <button class="zoom-btn" data-zoom="out" type="button">-</button>
            <span class="zoom-label">100%</span>
            <button class="zoom-btn" data-zoom="in" type="button">+</button>
            <button class="zoom-btn" data-zoom="reset" type="button">Reset</button>
          </span>
        </header>
        <div class="canvas">
          <div class="canvas-inner" id="mermaidCanvas">
            <div class="status">Loading <code>math.json</code>...</div>
          </div>
        </div>
      </article>
      <article class="panel" data-engine="dagre">
        <header class="panel-header">
          <h2 class="panel-title">Dagre-D3</h2>
          <span class="zoom-controls">
            <button class="zoom-btn" data-zoom="out" type="button">-</button>
            <span class="zoom-label">100%</span>
            <button class="zoom-btn" data-zoom="in" type="button">+</button>
            <button class="zoom-btn" data-zoom="reset" type="button">Reset</button>
          </span>
        </header>
        <div class="canvas">
          <div class="canvas-inner" id="dagreCanvas">
            <div class="status">Loading <code>math.json</code>...</div>
          </div>
        </div>
      </article>
      <article class="panel" data-engine="elk">
        <header class="panel-header">
          <h2 class="panel-title">ELK (layered)</h2>
          <span class="zoom-controls">
            <button class="zoom-btn" data-zoom="out" type="button">-</button>
            <span class="zoom-label">100%</span>
            <button class="zoom-btn" data-zoom="in" type="button">+</button>
            <button class="zoom-btn" data-zoom="reset" type="button">Reset</button>
          </span>
        </header>
        <div class="canvas">
          <div class="canvas-inner" id="elkCanvas">
            <div class="status">Loading <code>math.json</code>...</div>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
    import * as d3 from "https://esm.sh/d3@7";
    import dagreD3 from "https://esm.sh/dagre-d3@0.6.4";
    import Elk from "https://esm.sh/elkjs@0.8.2";

    const NODE_WIDTH = 140;
    const NODE_HEIGHT = 22;
    const GAP_X = 18;
    const GAP_Y = 8;
    const PADDING = 12;

    function clampZoom(value) {
      return Math.min(3, Math.max(0.1, value));
    }

    function escapeLabel(label) {
      return String(label).replace(/\\/g, "\\\\").replace(/"/g, '\\"');
    }

    function toSafeId(rawId) {
      return `n_${rawId}`.replace(/[^a-zA-Z0-9_]/g, "_");
    }

    function buildMermaidSource(items) {
      const lines = ["graph LR;"];
      const idMap = new Map();
      items.forEach((item) => {
        idMap.set(item.id, toSafeId(item.id));
      });
      items.forEach((item) => {
        const safeId = idMap.get(item.id);
        const label = item.label ?? item.id;
        lines.push(`  ${safeId}["${escapeLabel(label)}"]`);
      });
      items.forEach((item) => {
        const targetId = idMap.get(item.id);
        (item.prereqs || []).forEach((parentId) => {
          const sourceId = idMap.get(parentId);
          if (!sourceId || !targetId) return;
          lines.push(`  ${sourceId} --> ${targetId}`);
        });
      });
      return { source: lines.join("\n"), idMap };
    }

    function setError(targetEl, message) {
      targetEl.innerHTML = `<pre class="error"></pre>`;
      targetEl.querySelector("pre").textContent = message;
    }

    function attachZoom(panelEl, svgEl, zoomTarget, initialScale = 1) {
      const labelEl = panelEl.querySelector(".zoom-label");
      const zoomInBtn = panelEl.querySelector('[data-zoom="in"]');
      const zoomOutBtn = panelEl.querySelector('[data-zoom="out"]');
      const zoomResetBtn = panelEl.querySelector('[data-zoom="reset"]');

      const zoomBehavior = d3.zoom().scaleExtent([0.1, 3]).on("zoom", (event) => {
        zoomTarget.attr("transform", event.transform);
        const currentScale = event.transform.k;
        if (labelEl) labelEl.textContent = `${Math.round(currentScale * 100)}%`;
      });

      const svgSelection = d3.select(svgEl);
      svgSelection.call(zoomBehavior);

      const start = d3.zoomIdentity.scale(initialScale);
      svgSelection.call(zoomBehavior.transform, start);

      if (zoomInBtn) zoomInBtn.addEventListener("click", () => {
        svgSelection.transition().duration(120).call(zoomBehavior.scaleBy, 1.1);
      });
      if (zoomOutBtn) zoomOutBtn.addEventListener("click", () => {
        svgSelection.transition().duration(120).call(zoomBehavior.scaleBy, 0.9);
      });
      if (zoomResetBtn) zoomResetBtn.addEventListener("click", () => {
        svgSelection.transition().duration(120).call(zoomBehavior.transform, d3.zoomIdentity);
      });
    }

    async function renderMermaid(items) {
      const targetEl = document.getElementById("mermaidCanvas");
      try {
        const { source } = buildMermaidSource(items);
        mermaid.initialize({
          startOnLoad: false,
          securityLevel: "loose",
          theme: "base",
          fontFamily: "Fira Sans",
          flowchart: {
            curve: "linear",
            nodeSpacing: GAP_X,
            rankSpacing: GAP_Y,
            padding: 4
          },
          themeVariables: {
            primaryColor: "#ffffff",
            primaryTextColor: "#1f1f1f",
            primaryBorderColor: "#1f1f1f",
            lineColor: "#1f1f1f",
            clusterBkg: "#ffffff",
            clusterBorder: "#1f1f1f",
            fontFamily: "Fira Sans",
            fontSize: "11px"
          }
        });
        const id = `compare-mermaid-${Date.now()}`;
        const result = await mermaid.render(id, source);
        targetEl.innerHTML = result.svg;
        const svg = targetEl.querySelector("svg");
        const g = svg ? d3.select(svg).select("g") : null;
        if (svg && g) {
          attachZoom(targetEl.closest(".panel"), svg, g);
        }
      } catch (err) {
        setError(targetEl, "Mermaid render error:\n\n" + (err && err.message ? err.message : String(err)));
      }
    }

    function renderDagre(items) {
      const targetEl = document.getElementById("dagreCanvas");
      try {
        targetEl.innerHTML = "";
        const graph = new dagreD3.graphlib.Graph()
          .setGraph({
            rankdir: "LR",
            ranker: "network-simplex",
            nodesep: GAP_X,
            ranksep: GAP_Y,
            marginx: PADDING,
            marginy: PADDING
          })
          .setDefaultEdgeLabel(() => ({}));

        items.forEach((item) => {
          graph.setNode(item.id, {
            label: item.label ?? item.id,
            width: NODE_WIDTH,
            height: NODE_HEIGHT,
            rx: 6,
            ry: 6
          });
        });

        items.forEach((item) => {
          (item.prereqs || []).forEach((parentId) => {
            graph.setEdge(parentId, item.id, { curve: d3.curveLinear });
          });
        });

        const svg = d3.select(targetEl).append("svg");
        const inner = svg.append("g").attr("transform", `translate(${PADDING},${PADDING})`);
        const renderer = new dagreD3.render();
        renderer(inner, graph);

        const graphWidth = graph.graph().width + PADDING * 2;
        const graphHeight = graph.graph().height + PADDING * 2;
        svg.attr("width", graphWidth)
          .attr("height", graphHeight)
          .attr("viewBox", `0 0 ${graphWidth} ${graphHeight}`);

        attachZoom(targetEl.closest(".panel"), svg.node(), inner);
      } catch (err) {
        setError(targetEl, "Dagre-D3 render error:\n\n" + (err && err.message ? err.message : String(err)));
      }
    }

    async function renderElk(items) {
      const targetEl = document.getElementById("elkCanvas");
      try {
        targetEl.innerHTML = "";
        const elk = new Elk();
        const nodes = items.map((item) => ({
          id: item.id,
          width: NODE_WIDTH,
          height: NODE_HEIGHT,
          label: item.label ?? item.id
        }));
        const edges = [];
        items.forEach((item) => {
          (item.prereqs || []).forEach((parentId, idx) => {
            edges.push({
              id: `${parentId}->${item.id}-${idx}`,
              sources: [parentId],
              targets: [item.id]
            });
          });
        });

        const graph = {
          id: "root",
          layoutOptions: {
            "elk.algorithm": "layered",
            "elk.direction": "RIGHT",
            "elk.layered.crossingMinimization.strategy": "LAYER_SWEEP",
            "elk.layered.nodePlacement.strategy": "NETWORK_SIMPLEX",
            "elk.spacing.nodeNode": `${GAP_X}`,
            "elk.spacing.nodeNodeBetweenLayers": `${GAP_Y}`
          },
          children: nodes,
          edges
        };

        const layout = await elk.layout(graph);
        const width = (layout.width || 0) + PADDING * 2;
        const height = (layout.height || 0) + PADDING * 2;

        const svg = d3.select(targetEl).append("svg")
          .attr("width", width)
          .attr("height", height)
          .attr("viewBox", `0 0 ${width} ${height}`);

        const g = svg.append("g").attr("transform", `translate(${PADDING},${PADDING})`);

        const edgeGroup = g.append("g");
        (layout.edges || []).forEach((edge) => {
          (edge.sections || []).forEach((section) => {
            const points = [section.startPoint, ...(section.bendPoints || []), section.endPoint];
            const path = d3.line().curve(d3.curveLinear)(points.map((p) => [p.x, p.y]));
            if (!path) return;
            edgeGroup.append("path")
              .attr("class", "edgePath")
              .attr("d", path)
              .attr("stroke", "var(--link-stroke)")
              .attr("fill", "none");
          });
        });

        const nodeGroup = g.append("g");
        (layout.children || []).forEach((node) => {
          const nodeG = nodeGroup.append("g")
            .attr("class", "node")
            .attr("transform", `translate(${node.x || 0},${node.y || 0})`);
          nodeG.append("rect")
            .attr("width", node.width || NODE_WIDTH)
            .attr("height", node.height || NODE_HEIGHT);
          nodeG.append("text")
            .attr("x", (node.width || NODE_WIDTH) / 2)
            .attr("y", (node.height || NODE_HEIGHT) / 2)
            .text(node.label || node.id);
        });

        attachZoom(targetEl.closest(".panel"), svg.node(), g);
      } catch (err) {
        setError(targetEl, "ELK render error:\n\n" + (err && err.message ? err.message : String(err)));
      }
    }

    async function init() {
      let items = [];
      try {
        const res = await fetch("./math.json", { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        items = await res.json();
      } catch (err) {
        const message = "Could not load math.json.\n\n" + (err && err.message ? err.message : String(err));
        setError(document.getElementById("mermaidCanvas"), message);
        setError(document.getElementById("dagreCanvas"), message);
        setError(document.getElementById("d3dagCanvas"), message);
        return;
      }

      renderMermaid(items);
      renderDagre(items);
      renderElk(items);
    }

    init();
  </script>
</body>
</html>
