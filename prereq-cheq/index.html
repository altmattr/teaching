<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Prerequisite Cheq(uisite) for MQ students</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500&family=Fira+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f1ed;
      --panel: #ffffff;
      --text: #1f1f1f;
      --border: #d6d0c4;
      --accent: #a6192e;
      --accent-dark: #76232f;
      --muted: #5f5a54;
      --track: #373a36;
      --mono-font: "Fira Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Fira Sans", "Segoe UI", sans-serif;
      color: var(--text);
      background: #ffffff;
      min-height: 100vh;
      overflow: hidden;
    }

    html, body {
      height: 100%;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 16px;
      height: calc(100vh - 56px);
    }

    .page-title {
      margin: 0;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--accent-dark);
      position: relative;
    }

    .uid-chip {
      position: absolute;
      right: 44px;
      top: 50%;
      transform: translateY(-50%);
      border-radius: 999px;
      padding: 4px 10px;
      background: #ffffff;
      display: flex;
      gap: 6px;
      align-items: center;
      font-size: 0.72rem;
      line-height: 1;
      color: var(--text);
      white-space: nowrap;
    }

    .uid-chip .value {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text);
    }

    .load-indicator {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #d1d5db;
      background: #ffffff;
      font-size: 10px;
      line-height: 1;
    }

    .load-indicator.loading::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 999px;
      border: 2px solid #cbd5e1;
      border-top-color: #64748b;
      animation: spin 0.8s linear infinite;
    }

    .load-indicator.ready::before {
      content: "✓";
      color: #6b7280;
      font-weight: 600;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 10px 18px rgba(15, 23, 42, 0.07);
    }

    .controls h1 {
      margin: 0 0 8px 0;
      font-size: 1.15rem;
    }

    .controls p {
      margin: 0 0 14px 0;
      font-size: 0.95rem;
    }

    .controls {
      overflow: scroll;
      height: 100%;
    }

    .last-node {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #faf8f5;
      padding: 12px;
      min-height: 84px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .node-main {
      min-width: 0;
      display: grid;
      gap: 6px;
    }

    .node-score {
      flex-shrink: 0;
      text-align: right;
    }

    .label {
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .value {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
      word-break: break-word;
    }

    .node-score .value {
      font-size: 1.1rem;
    }

    .meta {
      margin-top: 10px;
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #faf8f5;
      padding: 10px 12px;
      display: grid;
      gap: 4px;
    }

    .meta .label {
      font-size: 0.72rem;
    }

    .meta .value {
      font-size: 0.95rem;
    }

    .questions {
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }

    .question {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      background: #ffffff;
      position: relative;
    }

    .question.locked {
      color: var(--muted);
      background: #f3efeb;
      border-color: var(--border);
    }

    .question-title {
      font-weight: 600;
      margin: 0 0 8px 0;
      font-size: 0.92rem;
      padding-right: 30px;
    }

    .question-title code {
      font-weight: 500;
    }

    .write-help-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      border: none;
      background: #2563eb;
      color: #ffffff;
      font-size: 0.8rem;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .write-help-popover {
      position: absolute;
      top: 34px;
      right: 8px;
      max-width: 280px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 8px 16px rgba(15, 23, 42, 0.12);
      padding: 8px 10px;
      font-size: 0.84rem;
      color: var(--text);
      z-index: 3;
    }

    .write-help-popover a {
      color: #2563eb;
      text-decoration: underline;
    }

    .write-help-popover[hidden] {
      display: none;
    }

    .choices {
      margin: 0;
      display: grid;
      gap: 6px;
      font-size: 0.9rem;
      padding: 0;
      list-style: none;
    }

    .choice {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      line-height: 1.3;
    }

    .choice input[type="radio"] {
      margin-top: 2px;
    }

    .code-label {
      margin: 10px 0 6px 0;
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .code-box {
      width: 100%;
      min-height: 88px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      padding: 8px 10px;
      font: 12px/1.4 var(--mono-font);
      white-space: pre;
      overflow: auto;
    }

    .question.locked .code-box {
      background: #ebe7e2;
      border-color: #cfc7bc;
      color: #6f685f;
    }

    .output-compare {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .output-panel {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      padding: 8px;
      min-height: 64px;
    }

    .output-title {
      margin: 0 0 6px 0;
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .output-text {
      margin: 0;
      font: 12px/1.4 var(--mono-font);
      white-space: pre-wrap;
      word-break: break-word;
    }

    code, pre, kbd, samp {
      font-family: var(--mono-font);
    }

    .hint {
      margin-top: 12px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .submit-btn {
      margin-top: 10px;
      border: 0;
      border-radius: 8px;
      padding: 10px 12px;
      font-weight: 600;
      color: white;
      background: var(--accent);
      cursor: pointer;
      position: sticky;
      top: 10px;
      z-index: 5;
      margin-left: auto;
      display: block;
    }

    .submit-btn:disabled {
      cursor: not-allowed;
      background: #9f978f;
    }

    .canvas-wrap {
      overflow: scroll;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      height: 100%;
    }
    #graph svg {
      background: white;
      border-radius: 12px;
      margin: 0;
    }

    #graph svg text {
      font-family: "Fira Sans", "Segoe UI", sans-serif;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
  <body>
  <h1 class="page-title">PreReq-Cheq <span class="uid-chip"><span class="value" id="uidValue">auth-pending</span></span><span class="load-indicator loading" id="loadIndicator" aria-label="Loading"></span></h1>
  <div class="layout">
    <section class="panel controls">
      <div class="last-node">
        <div class="node-main">
          <div class="value" id="lastNodeValue">No Selection</div>
        </div>
        <div class="node-score">
          <div class="label">Score</div>
          <div class="value" id="nodeScoreValue">0</div>
        </div>
      </div>
      <button class="submit-btn" id="submitAnswersBtn" type="button" disabled>Submit answers</button>
      <div class="hint" id="questionsHint">No topic selected yet.</div>
      <div class="questions" id="questions"></div>
    </section>

    <section class="panel canvas-wrap">
      <div id="graph"></div>
    </section>
  </div>

  <script src="https://unpkg.com/graphre@0.1.3/dist/graphre.js"></script>
  <script src="https://unpkg.com/nomnoml@1.7.0/dist/nomnoml.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script>
    const graphEl = document.getElementById('graph');
    const lastNodeEl = document.getElementById('lastNodeValue');
    const uidEl = document.getElementById('uidValue');
    const loadIndicatorEl = document.getElementById('loadIndicator');
    const nodeScoreEl = document.getElementById('nodeScoreValue');
    const submitBtnEl = document.getElementById('submitAnswersBtn');
    const questionsEl = document.getElementById('questions');
    const questionsHintEl = document.getElementById('questionsHint');
    const embedded = "[loading...]";
    let diagramSource = embedded;
    let scoreByTopic = {};
    let topicQuestionCountByKey = {};
    let topicQuestionIdSetByKey = {};
    let userGradesByTopic = {};
    let scoreHistoryByTopic = {};
    let localGradesByUid = {};
    let currentTopicLabel = '';
    let currentTopicKey = '';
    let currentQuestions = [];
    let selectedChoiceByQuestionId = {};
    let selectedWriteByQuestionId = {};
    let writeFeedbackByQuestionId = {};
    let currentUidAlias = '';
    let currentViaAlias = '';
    const urlParams = new URLSearchParams(window.location.search);
    const requestedUidAlias = (urlParams.get('uid') || '').trim();
    const requestedViaAlias = (urlParams.get('via') || '').trim();
    let activeUid = '';
    const initialTopicParam = urlParams.get('topic') || '';
    const firebaseConfig = {
      apiKey: "AIzaSyBDHEvOmP37CL4qFGyV8bGb0mAras28yDE",
      authDomain: "pre-req-cheq.firebaseapp.com",
      databaseURL: "https://pre-req-cheq-default-rtdb.firebaseio.com",
      projectId: "pre-req-cheq",
      storageBucket: "pre-req-cheq.firebasestorage.app",
      messagingSenderId: "494678027606",
      appId: "1:494678027606:web:30973a7e63330a8989baf7",
      measurementId: "G-ZXE7Z3L4HR"
    };

    const LOCAL_GRADES_KEY = 'prereq_cheq_user_grades_v1';
    const QUESTION_COUNT_CACHE_KEY = 'prereq_cheq_topic_question_count_v1';
    let firebaseDb = null;
    let firebaseEnabled = false;
    uidEl.textContent = '(auth pending)';

    function setLoadedState(ready) {
      if (!loadIndicatorEl) return;
      loadIndicatorEl.classList.toggle('loading', !ready);
      loadIndicatorEl.classList.toggle('ready', ready);
      loadIndicatorEl.setAttribute('aria-label', ready ? 'Loaded' : 'Loading');
    }

    function updateUidDisplay() {
      const uidText = activeUid || 'auth-unavailable';
      uidEl.textContent = currentUidAlias ? `${uidText} aka "${currentUidAlias}"` : uidText;
    }

    function withFontDirective(src) {
      return /^#font:/m.test(src) ? src : '#font: Fira Sans\n' + src;
    }

    function render() {
      try {
        graphEl.innerHTML = nomnoml.renderSvg(withFontDirective(diagramSource));
        applyNodeProgressBars();
      } catch (err) {
        graphEl.innerHTML = '<pre style="color:#b91c1c;margin:0">Render error: ' + err.message + '</pre>';
      }
    }

    async function boot() {
      try {
        const res = await fetch('./bit_tree.nomnoml', { cache: 'no-store' });
        diagramSource = res.ok ? await res.text() : embedded;
      } catch {
        diagramSource = embedded;
      }
      const labels = nodeLabelsFromSource(diagramSource);
      seedQuestionCountCacheForLabels(labels);
      render();
      setLoadedState(false);
      let pendingBootTasks = 2;
      const completeBootTask = () => {
        pendingBootTasks -= 1;
        if (pendingBootTasks <= 0) setLoadedState(true);
      };
      preloadQuestionCountsForLabels(labels)
        .then(() => {
          scoreByTopic = computeScoreByTopic(userGradesByTopic);
          persistQuestionCountCache();
          render();
          if (currentTopicLabel) nodeScoreEl.textContent = String(scoreForTopicLabel(currentTopicLabel));
        })
        .finally(completeBootTask);

      const initialLabel = resolveTopicLabel(initialTopicParam, labels);
      if (initialLabel) {
        lastNodeEl.textContent = initialLabel;
        nodeScoreEl.textContent = String(scoreForTopicLabel(initialLabel));
        loadQuestionsForTopic(initialLabel);
      }

      hydrateUserData()
        .then(() => {
          scoreByTopic = computeScoreByTopic(userGradesByTopic);
          render();
          if (currentTopicLabel) {
            nodeScoreEl.textContent = String(scoreForTopicLabel(currentTopicLabel));
            if (currentQuestions.length) renderQuestions(currentTopicLabel, currentQuestions);
          }
        })
        .catch((err) => {
          console.error('[boot] async hydration failed', err);
        })
        .finally(completeBootTask);
    }

    async function hydrateUserData() {
      await initFirebase();
      if (!activeUid) {
        activeUid = 'auth-unavailable';
        updateUidDisplay();
        console.warn('[auth] using fallback uid because Firebase auth uid is unavailable');
      }

      let baseUserGrades = {};
      try {
        const dbRes = await fetch('./db.json', { cache: 'no-store' });
        if (dbRes.ok) {
          const dbData = await dbRes.json();
          baseUserGrades = getUserTopicGrades(dbData, activeUid);
        }
      } catch {
        baseUserGrades = {};
      }

      const remoteUserRecord = await fetchFirebaseUserRecord(activeUid);
      const remoteUserGrades = extractGradesFromUserRecord(remoteUserRecord);
      const remoteScoreHistory = extractScoreHistoryFromUserRecord(remoteUserRecord);
      const remoteUidAlias = extractUidAliasFromUserRecord(remoteUserRecord);
      const remoteViaAlias = extractViaAliasFromUserRecord(remoteUserRecord);

      localGradesByUid = loadLocalGradesByUid();
      const localUserRecord = localGradesByUid[activeUid] || {};
      const localUserGrades = extractGradesFromUserRecord(localUserRecord);
      const localScoreHistory = extractScoreHistoryFromUserRecord(localUserRecord);
      const localUidAlias = extractUidAliasFromUserRecord(localUserRecord);
      const localViaAlias = extractViaAliasFromUserRecord(localUserRecord);

      userGradesByTopic = mergeTopicGrades(baseUserGrades, remoteUserGrades);
      userGradesByTopic = mergeTopicGrades(userGradesByTopic, localUserGrades);
      scoreHistoryByTopic = mergeScoreHistoryByTopic(remoteScoreHistory, localScoreHistory);
      currentUidAlias = requestedUidAlias || localUidAlias || remoteUidAlias || '';
      currentViaAlias = requestedViaAlias || localViaAlias || remoteViaAlias || '';
      updateUidDisplay();
      saveLocalUserRecord(activeUid, userGradesByTopic, currentUidAlias, currentViaAlias, scoreHistoryByTopic);
      if (requestedUidAlias) {
        await persistUidAliasUnderUser(requestedUidAlias, activeUid);
      }
      if (requestedViaAlias) {
        await persistViaAliasUnderUser(requestedViaAlias, activeUid);
      }
      if (requestedUidAlias || requestedViaAlias) {
        await persistFirebaseUserGrades(activeUid, userGradesByTopic, currentUidAlias, currentViaAlias, scoreHistoryByTopic);
      }

      console.log('[boot] grade sources merged', {
        uid: activeUid,
        firebaseEnabled,
        baseTopics: Object.keys(baseUserGrades || {}).length,
        remoteTopics: Object.keys(remoteUserGrades || {}).length,
        localTopics: Object.keys(localUserGrades || {}).length,
        finalTopics: Object.keys(userGradesByTopic || {}).length
      });
    }

    function topicToFilename(topicLabel) {
      return topicLabel
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '_')
        .replace(/^_+|_+$/g, '');
    }

    function nodeLabelsFromSource(src) {
      const labels = [];
      const lines = src.split(/\r?\n/);
      for (const raw of lines) {
        const line = raw.trim();
        const m = line.match(/^\[([^\]]+)\]$/);
        if (!m) continue;
        labels.push(m[1].replace(/\\n/g, ' '));
      }
      return labels;
    }

    function resolveTopicLabel(inputTopic, availableLabels) {
      if (!inputTopic) return '';
      const key = topicToFilename(inputTopic);
      if (!key) return '';
      const matched = availableLabels.find((label) => topicToFilename(label) === key);
      return matched || '';
    }

    async function preloadQuestionCountsForLabels(labels) {
      const uniqueKeys = [...new Set((labels || []).map((label) => topicToFilename(label)).filter(Boolean))];
      await Promise.all(uniqueKeys.map(async (key) => {
        const cachedCount = Number(topicQuestionCountByKey[key]);
        const hasQuestionIds = topicQuestionIdSetByKey[key] instanceof Set;
        if (Number.isFinite(cachedCount) && cachedCount >= 0 && hasQuestionIds) return;
        try {
          const res = await fetch('./questions/' + key + '.md', { cache: 'no-store' });
          if (!res.ok) {
            topicQuestionCountByKey[key] = 0;
            topicQuestionIdSetByKey[key] = new Set();
            return;
          }
          const text = await res.text();
          const questions = parseMarkdownQuestions(text);
          topicQuestionCountByKey[key] = questions.length;
          topicQuestionIdSetByKey[key] = new Set(questions.map((q) => q.id).filter(Boolean));
        } catch {
          topicQuestionCountByKey[key] = 0;
          topicQuestionIdSetByKey[key] = new Set();
        }
      }));
    }

    function loadQuestionCountCache() {
      try {
        const raw = localStorage.getItem(QUESTION_COUNT_CACHE_KEY);
        if (!raw) return {};
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === 'object' ? parsed : {};
      } catch {
        return {};
      }
    }

    function persistQuestionCountCache() {
      try {
        localStorage.setItem(QUESTION_COUNT_CACHE_KEY, JSON.stringify(topicQuestionCountByKey));
      } catch {
        // ignore storage failures
      }
    }

    function seedQuestionCountCacheForLabels(labels) {
      const cached = loadQuestionCountCache();
      const keys = [...new Set((labels || []).map((label) => topicToFilename(label)).filter(Boolean))];
      for (const key of keys) {
        const val = Number(cached[key]);
        if (Number.isFinite(val) && val > 0) topicQuestionCountByKey[key] = val;
      }
    }

    function scorePartsFromTopicData(topicData, topicKey) {
      if (!topicData || typeof topicData !== 'object') return { correct: 0, total: 0 };
      const validIdSet = topicQuestionIdSetByKey[topicKey];
      const grades = [];
      for (const [questionId, rawGrade] of Object.entries(topicData)) {
        const grade = Number(rawGrade);
        if (!Number.isFinite(grade)) continue;
        if (grade === 1 && validIdSet instanceof Set && !validIdSet.has(questionId)) continue;
        grades.push(grade);
      }
      return {
        correct: grades.reduce((sum, n) => sum + n, 0),
        total: grades.length
      };
    }

    function getUserTopicGrades(dbData, currentUid) {
      const raw = (dbData && dbData[currentUid]) || {};
      const out = {};
      for (const [topicKey, topicData] of Object.entries(raw || {})) {
        if (!topicData || typeof topicData !== 'object' || Array.isArray(topicData)) continue;
        const values = Object.values(topicData);
        const looksLikeGrades = values.length > 0 && values.every((v) => Number.isFinite(Number(v)));
        if (looksLikeGrades) out[topicKey] = topicData;
      }
      return out;
    }

    function mergeTopicGrades(base, overlay) {
      const merged = {};
      for (const [topic, topicGrades] of Object.entries(base || {})) {
        if (!topicGrades || typeof topicGrades !== 'object' || Array.isArray(topicGrades)) continue;
        merged[topic] = { ...(topicGrades || {}) };
      }
      for (const [topic, topicGrades] of Object.entries(overlay || {})) {
        if (!topicGrades || typeof topicGrades !== 'object' || Array.isArray(topicGrades)) continue;
        merged[topic] = { ...(merged[topic] || {}), ...(topicGrades || {}) };
      }
      return merged;
    }

    function loadLocalGradesByUid() {
      try {
        const raw = localStorage.getItem(LOCAL_GRADES_KEY);
        if (!raw) return {};
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === 'object' ? parsed : {};
      } catch {
        return {};
      }
    }

    function persistLocalGradesByUid() {
      try {
        localStorage.setItem(LOCAL_GRADES_KEY, JSON.stringify(localGradesByUid));
      } catch {
        // ignore storage failures
      }
    }

    function extractUidAliasFromUserRecord(record) {
      return record && typeof record.uidAlias === 'string' ? record.uidAlias : '';
    }

    function extractViaAliasFromUserRecord(record) {
      return record && typeof record.via === 'string' ? record.via : '';
    }

    function extractGradesFromUserRecord(record) {
      const out = {};
      for (const [key, value] of Object.entries(record || {})) {
        if (key === 'uidAlias') continue;
        if (key === 'via') continue;
        if (key === 'scoreHistory') continue;
        if (!value || typeof value !== 'object' || Array.isArray(value)) continue;
        out[key] = value;
      }
      return out;
    }

    function extractScoreHistoryFromUserRecord(record) {
      const raw = record && record.scoreHistory && typeof record.scoreHistory === 'object' ? record.scoreHistory : {};
      const out = {};
      for (const [topicKey, entries] of Object.entries(raw || {})) {
        if (!Array.isArray(entries)) continue;
        out[topicKey] = entries
          .filter((e) => e && typeof e === 'object')
          .map((e) => ({
            timestamp: Number(e.timestamp) || Date.now(),
            correct: Number(e.correct) || 0,
            total: Number(e.total) || 0
          }));
      }
      return out;
    }

    function mergeScoreHistoryByTopic(base, overlay) {
      const merged = {};
      for (const [topicKey, entries] of Object.entries(base || {})) {
        merged[topicKey] = Array.isArray(entries) ? [...entries] : [];
      }
      for (const [topicKey, entries] of Object.entries(overlay || {})) {
        if (!Array.isArray(entries)) continue;
        merged[topicKey] = [...(merged[topicKey] || []), ...entries];
      }
      return merged;
    }

    function buildUserRecord(gradesByTopic, uidAlias, viaAlias, scoreHistory) {
      const record = { ...(gradesByTopic || {}) };
      if (uidAlias) record.uidAlias = uidAlias;
      if (viaAlias) record.via = viaAlias;
      if (scoreHistory && Object.keys(scoreHistory).length) record.scoreHistory = scoreHistory;
      return record;
    }

    function saveLocalUserRecord(currentUid, gradesByTopic, uidAlias, viaAlias, scoreHistory) {
      localGradesByUid[currentUid] = buildUserRecord(gradesByTopic, uidAlias, viaAlias, scoreHistory);
      persistLocalGradesByUid();
    }

    function hasFirebaseConfig(cfg) {
      return Boolean(cfg.apiKey && cfg.authDomain && cfg.databaseURL && cfg.projectId && cfg.appId);
    }

    async function initFirebase() {
      const configOk = hasFirebaseConfig(firebaseConfig);
      if (!configOk) {
        console.warn('[firebase] config incomplete, skipping Firebase init', {
          hasApiKey: Boolean(firebaseConfig.apiKey),
          hasAuthDomain: Boolean(firebaseConfig.authDomain),
          hasDatabaseURL: Boolean(firebaseConfig.databaseURL),
          hasProjectId: Boolean(firebaseConfig.projectId),
          hasAppId: Boolean(firebaseConfig.appId)
        });
        return false;
      }
      if (typeof firebase === 'undefined') {
        console.error('[firebase] SDK globals missing (firebase is undefined)');
        return false;
      }
      try {
        if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
          console.log('[firebase] initialized app', { projectId: firebaseConfig.projectId });
        }
        await firebase.auth().signInAnonymously();
        activeUid = firebase.auth().currentUser && firebase.auth().currentUser.uid ? firebase.auth().currentUser.uid : '';
        updateUidDisplay();
        console.log('[firebase] anonymous auth success', { uid: activeUid });
        firebaseDb = firebase.database();
        firebaseEnabled = true;
        console.log('[firebase] realtime database ready');

      } catch (err) {
        firebaseDb = null;
        firebaseEnabled = false;
        console.error('[firebase] init/auth failed', {
          code: err && err.code ? err.code : '',
          message: err && err.message ? err.message : String(err),
          err
        });
        return false;
      }
    }

          topicCount: data && typeof data === 'object' ? Object.keys(data).length : 0

    function computeScoreByTopic(userData) {
      const result = {};
      for (const [topicKey, topicData] of Object.entries(userData || {})) {
        result[topicKey] = scorePartsFromTopicData(topicData, topicKey);
      }
      return result;
    }

    function scoreForTopicLabel(topicLabel) {
      const key = topicToFilename(topicLabel);
      const parts = scoreByTopic[key] || { correct: 0, total: 0 };
      const knownTotal = Number(topicQuestionCountByKey[key]);
      const total = Number.isFinite(knownTotal) && knownTotal >= 0 ? knownTotal : parts.total;
      return `${parts.correct}/${total}`;
    }

    function fractionCorrectForTopicKey(topicKey) {
      const topicGrades = userGradesByTopic[topicKey];
      if (!topicGrades || typeof topicGrades !== 'object') return 0;
      const parts = scorePartsFromTopicData(topicGrades, topicKey);
      const knownTotal = Number(topicQuestionCountByKey[topicKey]);
      const total = Number.isFinite(knownTotal) && knownTotal >= 0 ? knownTotal : parts.total;
      if (!total) return 0;
      return parts.correct / total;
    }

    function extractTopicKeyFromNodeGroup(group) {
      const textEl = group.querySelector('text');
      if (!textEl) return '';
      const tspans = [...textEl.querySelectorAll('tspan')].map((el) => el.textContent.trim()).filter(Boolean);
      const label = (tspans.length ? tspans.join(' ') : textEl.textContent.trim());
      return topicToFilename(label);
    }

    function extractTopicKeyFromTextElement(textEl) {
      if (!textEl) return '';
      const tspans = [...textEl.querySelectorAll('tspan')].map((el) => el.textContent.trim()).filter(Boolean);
      const label = (tspans.length ? tspans.join(' ') : textEl.textContent.trim());
      return topicToFilename(label);
    }

    function shapeElementInNodeGroup(group) {
      return group.querySelector('rect, ellipse, polygon, path[fill]:not([fill="none"])');
    }

    function nudgeTextUp(textEl, pixels) {
      if (textEl.dataset.nudged === '1') return;
      const y = parseFloat(textEl.getAttribute('y') || '');
      if (Number.isFinite(y)) textEl.setAttribute('y', String(y - pixels));
      const tspans = textEl.querySelectorAll('tspan');
      for (const tspan of tspans) {
        const ty = parseFloat(tspan.getAttribute('y') || '');
        if (Number.isFinite(ty)) tspan.setAttribute('y', String(ty - pixels));
      }
      textEl.dataset.nudged = '1';
    }

    function findNodeGroupForText(textEl) {
      let group = textEl.closest('g');
      while (group) {
        if (shapeElementInNodeGroup(group)) return group;
        group = group.parentElement ? group.parentElement.closest('g') : null;
      }
      return null;
    }

    function applyNodeProgressBars() {
      const svg = graphEl.querySelector('svg');
      if (!svg) return;
      svg.querySelectorAll('.node-progress-track, .node-progress-fill').forEach((el) => el.remove());
      svg.querySelectorAll('text[data-nudged=\"1\"]').forEach((el) => delete el.dataset.nudged);

      const processedGroups = new Set();
      const textNodes = svg.querySelectorAll('text');
      for (const textEl of textNodes) {
        const group = findNodeGroupForText(textEl);
        if (!group || processedGroups.has(group)) continue;
        processedGroups.add(group);
        const shape = shapeElementInNodeGroup(group);
        if (!shape || typeof shape.getBBox !== 'function') continue;
        const topicKey = extractTopicKeyFromTextElement(textEl);
        if (!topicKey) continue;

        nudgeTextUp(textEl, 5);

        const bbox = shape.getBBox();
        const inset = Math.max(6, bbox.width * 0.06);
        const barHeight = 5;
        const bottomGap = 4;
        const barWidth = Math.max(0, bbox.width - inset * 2);
        if (barWidth < 8 || bbox.height < 16) continue;

        const x = bbox.x + inset;
        const y = bbox.y + bbox.height - bottomGap - barHeight;
        const ratio = Math.max(0, Math.min(1, fractionCorrectForTopicKey(topicKey)));

        const track = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        track.setAttribute('class', 'node-progress-track');
        track.setAttribute('x', String(x));
        track.setAttribute('y', String(y));
        track.setAttribute('width', String(barWidth));
        track.setAttribute('height', String(barHeight));
        track.setAttribute('rx', '2');
        track.setAttribute('ry', '2');
        track.setAttribute('fill', 'var(--track)');
        track.setAttribute('stroke', 'none');
        track.setAttribute('pointer-events', 'none');

        const fill = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        fill.setAttribute('class', 'node-progress-fill');
        fill.setAttribute('x', String(x));
        fill.setAttribute('y', String(y));
        fill.setAttribute('width', String(barWidth * ratio));
        fill.setAttribute('height', String(barHeight));
        fill.setAttribute('rx', '2');
        fill.setAttribute('ry', '2');
        fill.setAttribute('fill', '#16a34a');
        fill.setAttribute('stroke', 'none');
        fill.setAttribute('pointer-events', 'none');

        group.appendChild(track);
        group.appendChild(fill);
      }
    }

    function parseMarkdownQuestions(text) {
      if (typeof marked === 'undefined' || typeof marked.lexer !== 'function') {
        console.error('[questions] marked parser unavailable');
        return parseMarkdownQuestionsFallback(text);
      }
      const tokens = marked.lexer(text);
      const questions = [];
      let current = null;

      function flushCurrent() {
        if (!current) return;
        if (current.id && current.prompt) {
          if (current.choices.length) {
            current.type = 'mcq';
            questions.push(current);
          } else if (current.template || current.solution) {
            current.type = 'write';
            questions.push(current);
          }
        }
        current = null;
      }

      for (const token of tokens) {
        if (token.type === 'heading' && token.depth === 1) {
          flushCurrent();
          current = { id: (token.text || '').trim(), prompt: '', choices: [], template: '', solution: '' };
          continue;
        }
        if (!current) continue;

        if (token.type === 'paragraph') {
          const para = (token.raw || token.text || '').trim();
          if (para) {
            current.prompt = current.prompt ? `${current.prompt}\n\n${para}` : para;
          }
          continue;
        }
        if (token.type === 'list') {
          for (const item of token.items || []) {
            const rawLine = ((item.raw || '').split(/\r?\n/)[0] || '').trim();
            let marker = '';
            let optionText = '';

            const fromRaw = rawLine.match(/^([+-])\s+(.*)$/);
            if (fromRaw) {
              marker = fromRaw[1];
              optionText = fromRaw[2].trim();
            } else {
              const fallback = (item.text || '').trim();
              if (fallback.startsWith('+ ') || fallback.startsWith('- ')) {
                marker = fallback[0];
                optionText = fallback.slice(2).trim();
              }
            }

            if (marker && optionText) {
              current.choices.push({
                text: optionText,
                correct: marker === '+'
              });
            }
          }
        }
        if (token.type === 'code') {
          const tag = (token.lang || '').trim().toLowerCase();
          if (tag === 'template') current.template = token.text || '';
          if (tag === 'solution') current.solution = token.text || '';
          if (tag !== 'template' && tag !== 'solution') {
            const fenced = '```' + (token.lang || '') + '\n' + (token.text || '') + '\n```';
            current.prompt = current.prompt ? `${current.prompt}\n\n${fenced}` : fenced;
          }
        }
      }

      flushCurrent();
      const fallback = parseMarkdownQuestionsFallback(text);
      const byId = new Map();
      for (const q of questions) byId.set(q.id, q);
      for (const q of fallback) {
        if (!byId.has(q.id)) byId.set(q.id, q);
      }
      return [...byId.values()];
    }

    function parseMarkdownQuestionsFallback(text) {
      const sections = text.split(/^#\s+/m).map((s) => s.trim()).filter(Boolean);
      const out = [];
      for (const section of sections) {
        const lines = section.split(/\r?\n/);
        const id = (lines.shift() || '').trim();
        if (!id) continue;

        const promptLines = [];
        const choices = [];
        let template = '';
        let solution = '';
        let fence = '';
        let fenceBuf = [];

        for (const raw of lines) {
          const line = raw.trimEnd();
          const s = line.trim();

          const fenceStart = s.match(/^```([a-zA-Z0-9_-]*)\s*$/);
          if (fenceStart) {
            if (!fence) {
              fence = (fenceStart[1] || '').toLowerCase();
              fenceBuf = [];
            } else {
              const code = fenceBuf.join('\n');
              if (fence === 'template') template = code;
              else if (fence === 'solution') solution = code;
              else promptLines.push('```' + fence + '\n' + code + '\n```');
              fence = '';
              fenceBuf = [];
            }
            continue;
          }
          if (fence) {
            fenceBuf.push(raw);
            continue;
          }

          if (s.startsWith('+ ') || s.startsWith('- ')) {
            choices.push({ text: s.slice(2).trim(), correct: s.startsWith('+ ') });
            continue;
          }
          if (s) promptLines.push(s);
        }

        const prompt = promptLines.join('\n').trim();
        if (!prompt) continue;
        if (choices.length) {
          out.push({ id, type: 'mcq', prompt, choices, template: '', solution: '' });
        } else if (template || solution) {
          out.push({ id, type: 'write', prompt, choices: [], template, solution });
        }
      }
      return out;
    }

    function renderBlockMarkdown(el, markdownText) {
      if (typeof marked === 'undefined' || typeof marked.parse !== 'function' || typeof DOMPurify === 'undefined') {
        el.textContent = markdownText || '';
        return;
      }
      const html = marked.parse(markdownText || '');
      el.innerHTML = DOMPurify.sanitize(html, {
        ALLOWED_TAGS: ['p', 'pre', 'code', 'em', 'strong', 'span', 'a', 'br'],
        ALLOWED_ATTR: ['href', 'title']
      });
    }

    function renderInlineMarkdown(el, markdownText) {
      if (typeof marked === 'undefined' || typeof marked.parseInline !== 'function' || typeof DOMPurify === 'undefined') {
        el.textContent = markdownText || '';
        return;
      }
      const html = marked.parseInline(markdownText || '');
      el.innerHTML = DOMPurify.sanitize(html, {
        ALLOWED_TAGS: ['code', 'em', 'strong', 'span', 'a', 'br'],
        ALLOWED_ATTR: ['href', 'title']
      });
    }

    function captureConsoleOutput(code) {
      const lines = [];
      const fakeConsole = {
        log: (...args) => lines.push(args.map((a) => String(a)).join(' ')),
        error: (...args) => lines.push(args.map((a) => String(a)).join(' '))
      };
      try {
        const fn = new Function('console', `"use strict";\n${code || ''}`);
        fn(fakeConsole);
        return { output: lines.join('\n'), runtimeError: '' };
      } catch (err) {
        return {
          output: lines.join('\n'),
          runtimeError: err && err.message ? err.message : String(err)
        };
      }
    }

    function renderQuestions(topicLabel, questions) {
      questionsEl.innerHTML = '';
      selectedChoiceByQuestionId = {};
      currentTopicLabel = topicLabel;
      currentTopicKey = topicToFilename(topicLabel);
      currentQuestions = questions;
      if (!questions.length) {
        questionsHintEl.textContent = 'No multiple-choice questions found in that file.';
        submitBtnEl.disabled = true;
        return;
      }
      questionsHintEl.textContent = `Loaded ${questions.length} question(s) for ${topicLabel}.`;
      const topicGrades = userGradesByTopic[currentTopicKey] || {};
      let hasUnlocked = false;
      for (let qi = 0; qi < questions.length; qi += 1) {
        const q = questions[qi];
        const locked = Number(topicGrades[q.id]) === 1;
        if (!locked) hasUnlocked = true;
        const card = document.createElement('article');
        card.className = 'question';
        if (locked) card.classList.add('locked');

        const title = document.createElement('div');
        title.className = 'question-title';
        renderBlockMarkdown(title, q.prompt);
        card.appendChild(title);
        if (q.type === 'write') {
          const helpBtn = document.createElement('button');
          helpBtn.type = 'button';
          helpBtn.className = 'write-help-btn';
          helpBtn.textContent = '?';
          helpBtn.setAttribute('aria-label', 'Write question help');

          const helpPopover = document.createElement('div');
          helpPopover.className = 'write-help-popover';
          helpPopover.hidden = true;
          helpPopover.innerHTML = 'you should write your code in <a href="https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference" target="_blank" rel="noopener noreferrer">javascript</a>';

          helpBtn.addEventListener('click', (ev) => {
            ev.stopPropagation();
            helpPopover.hidden = !helpPopover.hidden;
          });
          card.addEventListener('click', (ev) => {
            if (!helpPopover.hidden && !helpPopover.contains(ev.target) && ev.target !== helpBtn) {
              helpPopover.hidden = true;
            }
          });

          card.appendChild(helpBtn);
          card.appendChild(helpPopover);

          const tLabel = document.createElement('p');
          tLabel.className = 'code-label';
          tLabel.textContent = 'Template';
          card.appendChild(tLabel);

          const templateBox = document.createElement('textarea');
          templateBox.className = 'code-box';
          templateBox.spellcheck = false;
          templateBox.value = selectedWriteByQuestionId[q.id] ?? q.template ?? '';
          if (locked) templateBox.disabled = true;
          templateBox.addEventListener('input', () => {
            selectedWriteByQuestionId[q.id] = templateBox.value;
            delete writeFeedbackByQuestionId[q.id];
          });
          card.appendChild(templateBox);

          if (locked && q.solution) {
            const sLabel = document.createElement('p');
            sLabel.className = 'code-label';
            sLabel.textContent = 'Solution';
            card.appendChild(sLabel);

            const solutionBox = document.createElement('pre');
            solutionBox.className = 'code-box';
            solutionBox.textContent = q.solution;
            card.appendChild(solutionBox);
          } else if (!locked && writeFeedbackByQuestionId[q.id] && !writeFeedbackByQuestionId[q.id].match) {
            const feedback = writeFeedbackByQuestionId[q.id];
            const compare = document.createElement('div');
            compare.className = 'output-compare';

            const userPanel = document.createElement('div');
            userPanel.className = 'output-panel';
            userPanel.innerHTML = '<p class=\"output-title\">Your output</p>';
            const userText = document.createElement('pre');
            userText.className = 'output-text';
            userText.textContent = feedback.userOutput || '(no output)';
            userPanel.appendChild(userText);

            const solPanel = document.createElement('div');
            solPanel.className = 'output-panel';
            solPanel.innerHTML = '<p class=\"output-title\">Expected output</p>';
            const solText = document.createElement('pre');
            solText.className = 'output-text';
            solText.textContent = feedback.solutionOutput || '(no output)';
            solPanel.appendChild(solText);

            compare.appendChild(userPanel);
            compare.appendChild(solPanel);
            card.appendChild(compare);
          }
        } else {
          const list = document.createElement('ul');
          list.className = 'choices';
          for (let ci = 0; ci < q.choices.length; ci += 1) {
            const c = q.choices[ci];
            const item = document.createElement('li');
            item.className = 'choice';

            const input = document.createElement('input');
            input.type = 'radio';
            input.name = `q_${qi}`;
            input.id = `q_${qi}_c_${ci}`;
            input.value = String(ci);
            if (locked) {
              input.disabled = true;
              if (c.correct) input.checked = true;
            } else {
              input.addEventListener('change', () => {
                selectedChoiceByQuestionId[q.id] = ci;
              });
            }

            const label = document.createElement('label');
            label.setAttribute('for', input.id);
            renderInlineMarkdown(label, c.text);

            item.appendChild(input);
            item.appendChild(label);
            list.appendChild(item);
          }
          card.appendChild(list);
        }
        questionsEl.appendChild(card);
      }
      submitBtnEl.disabled = !hasUnlocked;
    }

    async function submitCurrentTopicAnswers() {
      if (!currentTopicKey || !currentQuestions.length) return;
      const topicGrades = { ...(userGradesByTopic[currentTopicKey] || {}) };
      let gradedCount = 0;
      let wrongCount = 0;
      const preExistingCorrectIds = currentQuestions
        .filter((q) => q.type === 'mcq')
        .map((q) => q.id)
        .filter((id) => Number(topicGrades[id]) === 1);

      for (const q of currentQuestions) {
        if (Number(topicGrades[q.id]) === 1) continue;
        if (q.type === 'mcq') {
          const selectedIndex = selectedChoiceByQuestionId[q.id];
          if (!Number.isInteger(selectedIndex)) {
            // Unanswered MCQ: do not grade or penalize.
            continue;
          }
          const selected = Number.isInteger(selectedIndex) ? q.choices[selectedIndex] : null;
          const isCorrect = Boolean(selected && selected.correct);
          topicGrades[q.id] = isCorrect ? 1 : 0;
          if (!isCorrect) wrongCount += 1;
          gradedCount += 1;
          continue;
        }
        if (q.type === 'write') {
          if (!Object.prototype.hasOwnProperty.call(selectedWriteByQuestionId, q.id)) {
            // Unanswered write question: do not grade or penalize.
            continue;
          }
          const userCode = selectedWriteByQuestionId[q.id] ?? q.template ?? '';
          const solutionCode = q.solution ?? '';
          const userRun = captureConsoleOutput(userCode);
          const solutionRun = captureConsoleOutput(solutionCode);
          const userOut = userRun.runtimeError ? `${userRun.output}\n[error] ${userRun.runtimeError}`.trim() : userRun.output;
          const solutionOut = solutionRun.runtimeError ? `${solutionRun.output}\n[error] ${solutionRun.runtimeError}`.trim() : solutionRun.output;
          const matched = userOut === solutionOut;
          topicGrades[q.id] = matched ? 1 : 0;
          if (!matched) wrongCount += 1;
          writeFeedbackByQuestionId[q.id] = { match: matched, userOutput: userOut, solutionOutput: solutionOut };
          gradedCount += 1;
        }
      }

      let penaltyCount = 0;
      for (const id of preExistingCorrectIds) {
        if (penaltyCount >= wrongCount) break;
        if (Number(topicGrades[id]) === 1) {
          topicGrades[id] = 0;
          penaltyCount += 1;
        }
      }

      userGradesByTopic[currentTopicKey] = topicGrades;
      const parts = scorePartsFromTopicData(topicGrades, currentTopicKey);
      const topicHistory = [...(scoreHistoryByTopic[currentTopicKey] || [])];
      topicHistory.push({
        timestamp: Date.now(),
        correct: parts.correct,
        total: parts.total
      });
      scoreHistoryByTopic[currentTopicKey] = topicHistory;
      saveLocalUserRecord(activeUid, userGradesByTopic, currentUidAlias, currentViaAlias, scoreHistoryByTopic);
      scoreByTopic = computeScoreByTopic(userGradesByTopic);
      nodeScoreEl.textContent = String(scoreForTopicLabel(currentTopicLabel));
      const remoteSaved = await persistFirebaseUserGrades(activeUid, userGradesByTopic, currentUidAlias, currentViaAlias, scoreHistoryByTopic);
      const storageText = remoteSaved
        ? 'local + Firebase backup'
        : (firebaseEnabled ? 'local only' : 'local only, Firebase not configured');
      const penaltyText = penaltyCount > 0 ? ` Penalty applied: ${penaltyCount} previously-correct question(s) reset.` : '';
      questionsHintEl.textContent = `Saved ${gradedCount} response(s) for ${currentTopicLabel} (${storageText}).${penaltyText}`;
      renderQuestions(currentTopicLabel, currentQuestions);
      render();
      document.querySelector('.controls')?.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function loadQuestionsForTopic(topicLabel) {
      const fileKey = topicToFilename(topicLabel);
      const filePath = `./questions/${fileKey}.md`;
      currentQuestions = [];
      currentTopicLabel = topicLabel;
      currentTopicKey = fileKey;
      selectedChoiceByQuestionId = {};
      selectedWriteByQuestionId = {};
      writeFeedbackByQuestionId = {};
      submitBtnEl.disabled = true;
      questionsEl.innerHTML = '';
      questionsHintEl.textContent = `Loading ${fileKey}.md...`;
      try {
        const res = await fetch(filePath, { cache: 'no-store' });
        if (!res.ok) {
          questionsHintEl.textContent = `Could not load ${fileKey}.md (HTTP ${res.status}).`;
          return;
        }
        const text = await res.text();
        const questions = parseMarkdownQuestions(text);
        topicQuestionCountByKey[fileKey] = questions.length;
        topicQuestionIdSetByKey[fileKey] = new Set(questions.map((q) => q.id).filter(Boolean));
        persistQuestionCountCache();
        scoreByTopic = computeScoreByTopic(userGradesByTopic);
        renderQuestions(topicLabel, questions);
        nodeScoreEl.textContent = String(scoreForTopicLabel(topicLabel));
        render();
      } catch {
        questionsHintEl.textContent = `Could not load ${fileKey}.md. Use a local web server rather than file://.`;
      }
    }

    graphEl.addEventListener('click', (event) => {
      const nodeGroup = event.target.closest('g');
      if (!nodeGroup) return;
      const textEl = nodeGroup.querySelector('text');
      if (!textEl) return;
      const tspans = [...textEl.querySelectorAll('tspan')].map((el) => el.textContent.trim()).filter(Boolean);
      const label = (tspans.length ? tspans.join(' / ') : textEl.textContent).trim();
      if (!label) return;
      lastNodeEl.textContent = label;
      nodeScoreEl.textContent = String(scoreForTopicLabel(label));
      loadQuestionsForTopic(label);
    });

    submitBtnEl.addEventListener('click', submitCurrentTopicAnswers);

    boot();
  </script>
</body>
</html>
